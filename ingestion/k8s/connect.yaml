apiVersion: v1
kind: Service
metadata:
  name: connect
spec:
  selector:
    app: connect
  ports:
    - name: http
      port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connect
  template:
    metadata:
      labels:
        app: connect
    spec:
      enableServiceLinks: false
      containers:
        - name: connect
          image: quay.io/debezium/connect:2.7.3.Final
          env:
            - name: BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: GROUP_ID
              value: socialrec-connect
            - name: CONFIG_STORAGE_TOPIC
              value: socialrec.connect.configs
            - name: OFFSET_STORAGE_TOPIC
              value: socialrec.connect.offsets
            - name: STATUS_STORAGE_TOPIC
              value: socialrec.connect.status
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
          ports:
            - containerPort: 8083
---
apiVersion: batch/v1
kind: Job
metadata:
  name: connector-init
spec:
  template:
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      containers:
        - name: connector-init
          image: curlimages/curl:8.8.0
          command:
            - /bin/sh
            - -c
            - |
              until curl -fsS http://connect:8083/connectors; do
                sleep 3
              done
              curl -fsS -X PUT http://connect:8083/connectors/socialrec-postgres-source/config \
                -H 'Content-Type: application/json' \
                --data @/config/source.config.json
          volumeMounts:
            - name: source-config
              mountPath: /config/source.config.json
              subPath: source.config.json
              readOnly: true
      volumes:
        - name: source-config
          configMap:
            name: socialrec-postgres-source-config

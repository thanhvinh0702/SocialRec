apiVersion: v1
kind: ConfigMap
metadata:
  name: socialrec-postgres-source-config
data:
  source.config.json: |
    {
      "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
      "plugin.name": "pgoutput",
      "database.hostname": "postgres",
      "database.port": "5432",
      "database.user": "socialrec",
      "database.password": "socialrec",
      "database.dbname": "socialrec",
      "database.server.name": "socialrec-db",
      "topic.prefix": "socialrec.cdc",
      "slot.name": "socialrec_slot",
      "publication.name": "socialrec_publication",
      "publication.autocreate.mode": "filtered",
      "schema.include.list": "public",
      "table.include.list": "public.users,public.posts,public.post_media,public.comments,public.interactions",
      "snapshot.mode": "initial",
      "tombstones.on.delete": "false",
      "decimal.handling.mode": "string",
      "time.precision.mode": "connect",
      "heartbeat.interval.ms": "10000",
      "slot.drop.on.stop": "false",
      "include.schema.changes": "false"
    }

apiVersion: v1
kind: Service
metadata:
  name: socialrec-web
spec:
  type: NodePort
  selector:
    app: socialrec-web
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socialrec-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: socialrec-web
  template:
    metadata:
      labels:
        app: socialrec-web
    spec:
      containers:
        - name: web
          image: socialrec-web:latest
          imagePullPolicy: Never
          env:
            - name: APP_PORT
              value: "8000"
            - name: APP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: socialrec-secrets
                  key: app-secret-key
            - name: DATABASE_URL
              value: postgresql://socialrec:socialrec@postgres:5432/socialrec
            - name: MINIO_ENDPOINT
              value: http://minio:9000
            - name: MINIO_BUCKET
              valueFrom:
                secretKeyRef:
                  name: socialrec-secrets
                  key: minio-bucket
          ports:
            - containerPort: 8000

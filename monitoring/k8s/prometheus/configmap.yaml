apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring

data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:

      - job_name: 'api'
        static_configs:
          - targets: ['api:8000']

      - job_name: 'recommender'
        static_configs:
          - targets: ['recommender:8001']
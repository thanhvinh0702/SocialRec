apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring

data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: "kubernetes-nodes"
        static_configs:
          - targets:
              - 'node-exporter.monitoring.svc.cluster.local:9100'

      - job_name: "kube-state"
        static_configs:
          - targets: 
              - 'kube-state-metrics.monitoring.svc.cluster.local:8080'

      - job_name: 'recommender'
        metrics_path: /metrics
        static_configs:
          - targets:
              - 'recommender.default.svc.cluster.local:8001'

      - job_name: "search-api"
        metrics_path: /metrics
        static_configs:
          - targets:
              - 'search-api.default.svc.cluster.local:80'
services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh cassandra 9042 -e 'DESCRIBE KEYSPACES'"]
      interval: 20s
      timeout: 10s
      retries: 10

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./recommender/init.cql:/init.cql
    entrypoint: ["bash", "-c", "cqlsh cassandra 9042 -f /init.cql"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  recommender:
    build:
      context: ./recommend-api
      dockerfile: Dockerfile
    container_name: recommmender
    ports:
      - "8000:8000"
    depends_on:
      cassandra:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  cassandra_data:
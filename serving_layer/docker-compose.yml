services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh cassandra 9042 -e 'DESCRIBE KEYSPACES'"]
      interval: 20s
      timeout: 10s
      retries: 10

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint: >
      bash -c "
      echo 'Creating schema...';

      cqlsh cassandra 9042 -e \"
      CREATE KEYSPACE IF NOT EXISTS socialrec
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
      \";

      cqlsh cassandra 9042 -e \"
      CREATE TABLE IF NOT EXISTS socialrec.user_interactions (
          user_id text,
          item_id text,
          score float,
          PRIMARY KEY (user_id, item_id)
      );
      \";

      echo 'Done';
      "

  api:
    build:
      context: ./recommender
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    depends_on:
      cassandra:
        condition: service_healthy
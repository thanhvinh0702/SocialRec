services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh cassandra 9042 -e 'DESCRIBE KEYSPACES'"]
      interval: 20s
      timeout: 10s
      retries: 10

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint: >
      bash -c "
      echo 'Creating schema...';

      cqlsh cassandra 9042 -e \"
      CREATE KEYSPACE IF NOT EXISTS socialrec
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
      \";

      cqlsh cassandra 9042 -e \"
      CREATE TABLE IF NOT EXISTS socialrec.user_interactions (
          user_id text,
          item_id text,
          score float,
          PRIMARY KEY (user_id, item_id)
      );
      \";

      echo 'Done';
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  recommender:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: recommmender
    ports:
      - "8000:8000"
    depends_on:
      cassandra:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
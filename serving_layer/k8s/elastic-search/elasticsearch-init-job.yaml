apiVersion: batch/v1
kind: Job
metadata:
  name: init-elasticsearch-index
spec:
  template:
    spec:
      containers:
        - name: init
          image: python:3.10
          command: ["/bin/bash", "-c"]
          args:
            - |
              pip install elasticsearch==8.11.0 &&
              python /scripts/create-index.py

          volumeMounts:
            - name: scripts
              mountPath: /scripts

      volumes:
        - name: scripts
          configMap:
            name: es-scripts

      restartPolicy: Never
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cassandra

spec:
  replicas: 1

  selector:
    matchLabels:
      app: cassandra

  template:
    metadata:
      labels:
        app: cassandra

    spec:
      containers:
        - name: cassandra
          image: cassandra:4.1

          ports:
            - containerPort: 9042

          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: "btl-cluster"

            - name: MAX_HEAP_SIZE
              value: "512M"

            - name: HEAP_NEWSIZE
              value: "100M"

          volumeMounts:
            - name: cassandra-storage
              mountPath: /var/lib/cassandra

          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"

            limits:
              memory: "2Gi"
              cpu: "1"

      volumes:
        - name: cassandra-storage
          persistentVolumeClaim:
            claimName: cassandra-pvc
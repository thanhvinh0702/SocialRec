apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-api
  template:
    metadata:
      labels:
        app: search-api
    spec:
      containers:
        - name: search-api
          image: search-api:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          env:
            - name: CASSANDRA_HOST
              value: "cassandra"
            - name: ELASTIC_HOST
              value: "elasticsearch"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20